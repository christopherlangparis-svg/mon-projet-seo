name: 🔍 Audit SEO Hebdomadaire

on:
  # Chaque lundi à 7h00 (UTC) = 8h00 heure de Paris
  schedule:
    - cron: '0 7 * * 1'

  # Déclenchement manuel depuis l'interface GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-audit:
    name: Crawl & génération du rapport SEO
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installation des dépendances
        run: |
          cd scripts
          npm install

      - name: 🕷️ Exécution du script d'audit SEO
        run: node scripts/seo-audit.js

      - name: 📁 Vérification du rapport généré
        run: |
          ls -la rapports/
          cat rapports/$(ls -t rapports/ | head -1)

      - name: 📤 Commit & push du rapport
        run: |
          git config user.name  "SEO Bot 🤖"
          git config user.email "seo-bot@lacapitainerie.com"
          git add rapports/
          # Commit uniquement si un fichier a changé
          git diff --staged --quiet || git commit -m "📊 Rapport SEO hebdomadaire — $(date +'%d/%m/%Y')"
          git push
